<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepak ~ Android Engineer & Builder</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #080A10;
        }

        /* Loading screen */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #080A10;
            color: #F5A623;
            font-family: 'JetBrains Mono', monospace;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading .spinner {
            width: 40px; height: 40px;
            border: 3px solid #1A1D2E;
            border-top-color: #F5A623;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #loading p { margin-top: 16px; font-size: 14px; color: #9CA3AF; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @font-face {
            font-family: 'JetBrains Mono';
            src: url('https://cdn.jsdelivr.net/gh/JetBrains/JetBrainsMono/fonts/webfonts/JetBrainsMono-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('https://cdn.jsdelivr.net/gh/JetBrains/JetBrainsMono/fonts/webfonts/JetBrainsMono-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }
    </style>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>Initializing Buddy...</p>
    </div>
    <canvas id="ComposeTarget"></canvas>
    <script src="buddy-web.js"></script>
    <script>
        // Hide loading screen once Wasm is ready
        window.addEventListener('compose-ready', () => {
            document.getElementById('loading')?.classList.add('hidden');
            setTimeout(() => document.getElementById('loading')?.remove(), 300);
        });
    </script>
</body>
</html>
